{% extends 'lib/base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<style>
  :root {
    --primary-blue: #0f172a;
    --secondary-blue: #1e293b;
    --teal-accent: #14b8a6;
    --light-teal: #5eead4;
    --card-bg: #ffffff;
    --text-primary: #0f172a;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
  }

  .forgot-page {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 50%, #0d3d4d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  .forgot-page::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 80%;
    height: 150%;
    background: radial-gradient(circle, rgba(20, 184, 166, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .forgot-page::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -20%;
    width: 60%;
    height: 100%;
    background: radial-gradient(circle, rgba(94, 234, 212, 0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .forgot-container {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  .forgot-card {
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    animation: slideUp 0.6s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .forgot-header {
    background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
    padding: 40px 35px;
    text-align: center;
    position: relative;
  }

  .forgot-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal-accent), transparent);
  }

  .header-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--teal-accent), var(--light-teal));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 30px rgba(20, 184, 166, 0.3);
  }

  .header-icon i {
    font-size: 2rem;
    color: white;
  }

  .forgot-header h4 {
    color: white;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 10px;
  }

  .forgot-header p {
    color: rgba(255,255,255,0.7);
    font-size: 0.95rem;
    margin: 0;
    line-height: 1.6;
  }

  .forgot-body {
    padding: 40px 35px;
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
    font-size: 0.95rem;
  }

  .form-group input[type="email"],
  .form-group input[type="text"] {
    width: 100%;
    padding: 16px 20px;
    border: 2px solid var(--border-color);
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f8fafc;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--teal-accent);
    box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
    background: white;
  }

  .form-group input::placeholder {
    color: #94a3b8;
  }

  .btn-reset {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--teal-accent), var(--light-teal));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-reset:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4);
  }

  .btn-reset i {
    font-size: 1.1rem;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 30px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.3s ease;
  }

  .back-link:hover {
    color: var(--light-teal);
  }

  .back-link i {
    margin-right: 6px;
  }
</style>

<div class="forgot-page">
  <div class="forgot-container">
    <div class="forgot-card">
      <div class="forgot-header">
        <div class="header-icon">
          <i class="fas fa-key"></i>
        </div>
        <h4>Forgot Password?</h4>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
      </div>
      <div class="forgot-body">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            {{ form.email.label_tag }}
            {{ form.email }}
          </div>
          <button type="submit" class="btn-reset">
            <i class="fas fa-paper-plane"></i>
            Send Reset Link
          </button>
        </form>
      </div>
    </div>
    <a href="{% url 'lib:login' %}" class="back-link">
      <i class="fas fa-arrow-left"></i>Back to Login
    </a>
  </div>
</div>
{% endblock %}
